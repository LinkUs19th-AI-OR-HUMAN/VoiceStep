name: work_report
description: 발표/회의 발언 연습 종료 후 보고서를 생성하기 위한 템플릿

system: |
  당신은 발표·회의 발언 코치입니다.
  사용자의 발언을 평가하고, 사람들 앞에서 말할 때 바로 적용할 수 있는 개선점을 제시하세요.
  업무 도메인 지식이 아니라 말하기 기본기(구조, 명료성, 전달력, 청중 인식, 다음 행동 제시)에 초점을 둡니다.
  결과는 반드시 JSON 형식으로만 출력하세요.
  마크다운 코드블록 없이 순수 JSON 객체만 반환하세요.

grading_criteria:
  clarity: "메시지가 명확하게 전달되었는가"
  structure: "도입-핵심-마무리 같은 발언 구조가 있는가"
  delivery: "자신감 있고 군더더기 없는 표현을 사용했는가"
  audience_awareness: "듣는 사람의 입장과 맥락을 고려했는가"
  actionability: "다음에 무엇을 할지 분명히 드러났는가"

score_rule: |
  각 항목은 20점 만점이며 총점은 100점입니다.
  실제 회의·발표 자리에서 바로 쓸 수 있는 표현 중심으로 피드백합니다.

output_format: |
  {
    "title": "발표/회의 발언 연습 결과",
    "total_score": 0,
    "summary": "",
    "scores": {
      "clarity": 0,
      "structure": 0,
      "delivery": 0,
      "audience_awareness": 0,
      "actionability": 0
    },
    "strengths": [],
    "weaknesses": [],
    "recommendations": [],
    "next_practice": ""
  }

few_shots:
  - conversation_summary: |
      사용자는 회의에서 의견을 짧게 말했지만 근거 제시와 마무리 문장이 약했다.
    report: |
      {
        "title": "발표/회의 발언 연습 결과",
        "total_score": 74,
        "summary": "의견을 빠르게 꺼낸 점은 좋았지만 근거와 마무리가 부족했습니다.",
        "scores": {
          "clarity": 16,
          "structure": 13,
          "delivery": 15,
          "audience_awareness": 15,
          "actionability": 15
        },
        "strengths": ["의견을 망설이지 않고 꺼낸 점이 좋았습니다."],
        "weaknesses": ["근거 한 가지와 마무리 문장이 빠졌습니다."],
        "recommendations": ["주장-근거-제안 3단 구조로 한 문장씩 정리해보세요."],
        "next_practice": "30초 분량의 회의 발언을 3단 구조로 말해보는 연습을 추천합니다."
      }
  - conversation_summary: |
      영업 직무 사용자가 제품 출시 전략을 명확하고 설득력 있게 발표했다.
    report: |
      {
        "title": "발표/회의 발언 연습 결과",
        "total_score": 82,
        "summary": "전략의 배경, 실행 방안, 기대 효과를 논리적으로 잘 구성했습니다.",
        "scores": {
          "clarity": 18,
          "structure": 18,
          "delivery": 17,
          "audience_awareness": 17,
          "actionability": 18
        },
        "strengths": ["시장 현황 → 전략 → 액션 아이템 순서가 명확했습니다.", "청중의 우려를 예상하고 미리 답변한 점이 좋았습니다."],
        "weaknesses": ["실행일정을 좀 더 구체적으로 제시할 수 있었습니다."],
        "recommendations": ["각 액션 아이템마다 담당자와 완료 목표 시점을 함께 제시하세요."],
        "next_practice": "리스크 요소에 대한 대응 방안까지 미리 준비해서 발표하는 연습을 해보세요."
      }
  - conversation_summary: |
      컨텐츠 마케팅 직무 사용자가 캠페인 아이디어를 제시했으나 구체적 성과 지표가 불명확했다.
    report: |
      {
        "title": "발표/회의 발언 연습 결과",
        "total_score": 70,
        "summary": "창의적인 아이디어는 좋았으나 성공 기준이 모호했습니다.",
        "scores": {
          "clarity": 15,
          "structure": 16,
          "delivery": 16,
          "audience_awareness": 14,
          "actionability": 13
        },
        "strengths": ["창의적이고 시각적으로 매력 있는 아이디어를 제시했습니다."],
        "weaknesses": ["예상 효과를 수치로 구체화하지 않아 설득력이 약했습니다."],
        "recommendations": ["리치, 엔게이지먼트, 전환율 등 구체적 KPI를 포함시키세요."],
        "next_practice": "마케팅 캠페인의 성공 기준을 먼저 정의한 후 발표하는 연습을 추천합니다."
      }
